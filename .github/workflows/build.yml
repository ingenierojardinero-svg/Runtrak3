name: 🏃 Build RunTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create project structure
        run: |
          mkdir -p .github/workflows
          mkdir -p app/src/main/java/com/runtrack/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      # ── settings.gradle ─────────────────────────────────────────────────
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RunTrack"
          include ':app'
          GRADLE

      # ── build.gradle (root) ──────────────────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          task clean(type: Delete) { delete rootProject.buildDir }
          GRADLE

      # ── gradle.properties ───────────────────────────────────────────────
      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

      # ── gradle wrapper ───────────────────────────────────────────────────
      - name: Write gradle wrapper properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

      - name: Download gradle wrapper jar
        run: |
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
               -o gradle/wrapper/gradle-wrapper.jar

      - name: Write gradlew
        run: |
          cat > gradlew << 'SH'
          #!/usr/bin/env sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          if [ -n "$JAVA_HOME" ]; then JAVACMD="$JAVA_HOME/bin/java"; else JAVACMD="java"; fi
          exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          SH
          chmod +x gradlew

      # ── app/build.gradle ─────────────────────────────────────────────────
      - name: Write app build.gradle
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.runtrack.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.runtrack.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "2.0"
              }
              buildTypes {
                  debug { debuggable true }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          GRADLE

      - name: Write proguard-rules.pro
        run: echo '-keepclassmembers class com.runtrack.app.MainActivity$Bridge { public *; }' > app/proguard-rules.pro

      # ── AndroidManifest.xml ──────────────────────────────────────────────
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.HIGH_SAMPLING_RATE_SENSORS"/>
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XML

      # ── MainActivity.java ────────────────────────────────────────────────
      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/runtrack/app/MainActivity.java << 'JAVA'
          package com.runtrack.app;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.view.WindowManager;
          import android.webkit.GeolocationPermissions;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.view.WindowCompat;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private static final int LOC = 100;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                  webView = new WebView(this);
                  webView.setFitsSystemWindows(true);
                  setContentView(webView);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setDatabaseEnabled(true);
                  ws.setGeolocationEnabled(true);
                  ws.setGeolocationDatabasePath(getFilesDir().getAbsolutePath());
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setLoadWithOverviewMode(true);
                  ws.setUseWideViewPort(true);
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback cb) {
                          cb.invoke(origin, true, false);
                      }
                  });
                  webView.setWebViewClient(new WebViewClient());
                  webView.addJavascriptInterface(new Bridge(), "AndroidBridge");
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION}, LOC);
                  }
                  webView.loadUrl("file:///android_asset/www/index.html");
              }
              public class Bridge {
                  @JavascriptInterface
                  public void keepScreenOn(boolean on) {
                      runOnUiThread(() -> {
                          if (on) getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                          else    getWindow().clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                      });
                  }
              }
              @Override public void onRequestPermissionsResult(int c, String[] p, int[] r) {
                  super.onRequestPermissionsResult(c, p, r);
                  if (c == LOC && r.length > 0 && r[0] == PackageManager.PERMISSION_GRANTED) webView.reload();
              }
              @Override public void onBackPressed() { if (webView.canGoBack()) webView.goBack(); else super.onBackPressed(); }
              @Override protected void onPause()  { super.onPause();  webView.onPause();  }
              @Override protected void onResume() { super.onResume(); webView.onResume(); }
              @Override protected void onDestroy(){ super.onDestroy(); webView.destroy(); }
          }
          JAVA

      # ── Resources ────────────────────────────────────────────────────────
      - name: Write resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">RunTrack</string></resources>
          XML

          cat > app/src/main/res/values/themes.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@color/bg</item>
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/transparent</item>
                  <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
              </style>
          </resources>
          XML

          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg">#FAFAF7</color>
              <color name="accent">#16A34A</color>
          </resources>
          XML

          cat > app/src/main/res/drawable/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0A0A0A" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#C4FF3D"
                    android:pathData="M54,18c-3.31,0-6,2.69-6,6s2.69,6,6,6 6,-2.69,6,-6-2.69,-6-6,-6z"/>
              <path android:fillColor="#C4FF3D"
                    android:pathData="M44,36l-8,36 6,0 4.5,-20 5,5 0,16 6,0 0,-20-6,-6 1.5,-8c3,3,7.5,6,12,6l0,-6c-3.75,0-7.5,-2.25-9,-5.25l-2.25,-3.75c-0.75,-1.5-2.25,-2.25-3.75,-2.25L44,36z"/>
          </vector>
          XML

          ICON_XML='<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/bg"/><foreground android:drawable="@drawable/ic_launcher"/></adaptive-icon>'
          echo "$ICON_XML" > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo "$ICON_XML" > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

